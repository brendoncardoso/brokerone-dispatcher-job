apiVersion: apps/v1
kind: Deployment
metadata:
  name: brokerone-kafka-dispatcher-local
  namespace: local
  labels:
    app: brokerone-kafka-dispatcher-local
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: brokerone-kafka-dispatcher-local
  template:
    metadata:
      labels:
        app: brokerone-kafka-dispatcher-local
    spec:
      serviceAccountName: dispatcher-sa
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 10
      enableServiceLinks: false
      containers:
        - name: dispatcher
          image: broker-app-worker-base:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: brokerone-kafka-dispatcher-keys-local
          resources:
            limits:
              cpu: "0.5"
              memory: 512Mi
            requests:
              cpu: "0.1"
              memory: 300Mi